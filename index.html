<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 ProGuesser 1V1 对战</title>
    <style>
        :root { --green: #4caf50; --yellow: #ffeb3b; --red: #f44336; --dark: #121212; --blue: #3498db; --panel: #1e1e1e; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .hidden { display: none; }
        .card { background: var(--panel); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; margin: 8px 0; width: 100%; box-sizing: border-box; }
        button { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; background: var(--blue); color: white; font-weight: bold; margin: 5px; transition: 0.2s; }
        .status-bar { background: #222; padding: 10px 20px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #333; width: 100%; max-width: 560px; }
        .search-wrap { position: relative; width: 100%; max-width: 600px; margin-bottom: 20px; }
        #suggBox { position: absolute; width: 100%; background: #2c3e50; border-radius: 0 0 8px 8px; z-index: 100; max-height: 200px; overflow-y: auto; }
        .s-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #3e4f5f; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 8px; width: 100%; max-width: 600px; }
        .cell { height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 0.8em; font-weight: bold; text-align: center; }
        .green { background: var(--green); color: white; }
        .yellow { background: var(--yellow); color: black; }
        .red { background: var(--red); color: white; }
        .loader { border: 4px solid #333; border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="menuUI" class="card">
        <h1>🎮 CS2 ProGuesser</h1>
        <input type="text" id="username" placeholder="输入昵称" value="玩家">
        <button onclick="startMode('local')" style="background: var(--green); width: 100%;">🕹️ 单机模式</button>
        <hr style="border:0.5px solid #333; margin:20px 0">
        <div style="display: flex; gap: 5px;">
            <input type="text" id="ridInput" placeholder="房号" style="flex: 1;">
            <button onclick="startMode('join')" style="width: 80px;">加入</button>
        </div>
        <button onclick="startMode('create')" style="width: 100%;">🔥 创建房间</button>
    </div>

    <div id="waitUI" class="hidden card">
        <h2 id="displayRid">房号: ----</h2>
        <div class="loader"></div>
        <p>等待对手加入中... (1/2)</p>
        <button onclick="location.reload()" style="background: #555;">退出</button>
    </div>

    <div id="gameUI" class="hidden">
        <div class="status-bar">
            <div id="modeTag">模式</div>
            <div id="roomTag">房号</div>
            <div>机会: <b id="chanceTag" style="color:var(--red)">10</b></div>
        </div>
        <div class="search-wrap">
            <input type="text" id="searchBox" placeholder="搜索选手..." oninput="handleSearch(this.value)">
            <div id="suggBox"></div>
        </div>
        <div class="grid" style="color:#777; font-size:0.7em; text-align:center">
            <div>选手</div><div>队伍</div><div>地区</div><div>年龄</div><div>身份</div>
        </div>
        <div id="history"></div>
    </div>

    <script>
        const API_URL = 'https://mininet-vm.taildb667f.ts.net';
        const JSON_URL = 'https://raw.githubusercontent.com/MayIyask/fu18/main/players.json';

        let pool = [], answer = null, chances = 10, over = false, rid = null, myName = "", syncTimer = null;

        (async () => {
            const r = await fetch(JSON_URL);
            pool = await r.json();
        })();

        async function startMode(mode) {
            myName = document.getElementById('username').value.trim() || "玩家";
            if (mode === 'local') {
                answer = pool[Math.floor(Math.random() * pool.length)];
                initUI('game', "🕹️ 单机", "LOCAL");
            } else if (mode === 'create') {
                const r = await fetch(`${API_URL}/create_room`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({players: pool, username: myName})
                });
                const d = await r.json();
                rid = d.room;
                initUI('wait', rid);
                startSync();
            } else if (mode === 'join') {
                rid = document.getElementById('ridInput').value.trim();
                const r = await fetch(`${API_URL}/join_room`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({room: rid, username: myName})
                });
                if(!r.ok) return alert("房间不存在或已满");
                initUI('wait', rid);
                startSync();
            }
        }

        function startSync() {
            syncTimer = setInterval(async () => {
                try {
                    const r = await fetch(`${API_URL}/sync`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({room: rid, username: myName})
                    });
                    const d = await r.json();
                    if (d.status === 'closed' && !over) {
                        alert("对局已结束或房间关闭");
                        location.reload();
                    } else if (d.status === 'playing' && !answer) {
                        answer = d.answer;
                        initUI('game', "🏠 1V1", rid);
                    }
                } catch(e) {}
            }, 3000);
        }

        function initUI(type, modeTxt, ridTxt) {
            document.getElementById('menuUI').classList.add('hidden');
            document.getElementById('waitUI').classList.add('hidden');
            document.getElementById('gameUI').classList.add('hidden');
            if (type === 'wait') {
                document.getElementById('waitUI').classList.remove('hidden');
                document.getElementById('displayRid').innerText = "房号: " + modeTxt;
            } else {
                document.getElementById('gameUI').classList.remove('hidden');
                document.getElementById('modeTag').innerText = modeTxt;
                document.getElementById('roomTag').innerText = "房号: " + ridTxt;
            }
        }

        function handleSearch(v) {
            const b = document.getElementById('suggBox'); b.innerHTML = '';
            if(!v || over || !answer) return;
            pool.filter(p => p.name.toLowerCase().includes(v.toLowerCase())).slice(0,5).forEach(p => {
                const d = document.createElement('div');
                d.className = 's-item'; d.innerText = `${p.name} (${p.team})`;
                d.onclick = () => submit(p);
                b.appendChild(d);
            });
        }

        async function submit(p) {
            document.getElementById('suggBox').innerHTML = '';
            document.getElementById('searchBox').value = '';

            const res = {
                name: p.name === answer.name ? 'green' : 'red',
                team: p.team === answer.team ? 'green' : 'red',
                cont: p.country === answer.country ? 'green' : (p.cont === answer.cont ? 'yellow' : 'red'),
                age: p.age === answer.age ? 'green' : (Math.abs(p.age - answer.age) <= 3 ? 'yellow' : 'red'),
                role: p.role === answer.role ? 'green' : 'red'
            };

            const arrow = p.age < answer.age ? "↑" : (p.age > answer.age ? "↓" : "");
            const row = document.createElement('div'); row.className = 'grid';
            const fields = [p.name, p.team, p.country, `${p.age}${arrow}`, p.role];
            const colors = [res.name, res.team, res.cont, res.age, res.role];

            fields.forEach((f, i) => {
                const c = document.createElement('div');
                c.className = `cell ${colors[i]}`;
                c.innerHTML = `<span>${f}</span>`;
                row.appendChild(c);
            });
            document.getElementById('history').prepend(row);

            if (p.name === answer.name) {
                over = true;
                if(rid !== 'LOCAL') await fetch(`${API_URL}/win`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({room: rid})
                });
                alert("🎯 猜对了！答案是: " + answer.name);
                location.reload();
            }
            chances--; document.getElementById('chanceTag').innerText = chances;
            if(chances <= 0 && !over) { over = true; alert("💀 失败！答案是: " + answer.name); location.reload(); }
        }
    </script>
</body>
</html>
