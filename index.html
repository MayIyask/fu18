<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 ProGuesser 1V1 对战</title>
    <style>
        :root { --green: #4caf50; --yellow: #ffeb3b; --red: #f44336; --dark: #121212; --blue: #3498db; --panel: #1e1e1e; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .hidden { display: none; }
        
        /* 卡片样式 */
        .card { background: var(--panel); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; margin: 8px 0; width: 100%; box-sizing: border-box; }
        button { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; background: var(--blue); color: white; font-weight: bold; margin: 5px; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        
        /* 游戏界面 */
        #gameUI { width: 100%; max-width: 600px; }
        .status-bar { background: #222; padding: 10px 20px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #333; }
        
        /* 搜索框 */
        .search-wrap { position: relative; margin-bottom: 20px; }
        #suggBox { position: absolute; width: 100%; background: #2c3e50; border-radius: 0 0 8px 8px; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.5); max-height: 200px; overflow-y: auto; }
        .s-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #3e4f5f; text-align: left; }
        .s-item:hover { background: #34495e; }

        /* 猜测表格 */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 8px; }
        .cell { height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 0.8em; font-weight: bold; text-align: center; }
        .header-text { font-size: 0.7em; color: #777; text-transform: uppercase; margin-bottom: 5px; }
        .arrow { font-size: 1.2em; line-height: 1; }

        /* 颜色 */
        .green { background: var(--green); color: white; }
        .yellow { background: var(--yellow); color: black; }
        .red { background: var(--red); color: white; }

        /* 加载动画 */
        .loader { border: 4px solid #333; border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="menuUI" class="card">
        <h1>🎮 CS2 ProGuesser</h1>
        <input type="text" id="username" placeholder="输入你的昵称" value="玩家1">
        
        <button onclick="startMode('local')" style="background: var(--green); width: 100%; margin-top: 15px;">🕹️ 单机模式</button>
        <div style="margin: 20px 0; color: #555; font-size: 0.8em;">———— 1V1 在线对战 ————</div>
        
        <div style="display: flex; gap: 5px;">
            <input type="text" id="ridInput" placeholder="输入房号" style="flex: 1;">
            <button onclick="startMode('join')" style="width: 80px;">加入</button>
        </div>
        <button onclick="startMode('create')" style="width: 100%;">🔥 创建房间</button>
    </div>

    <div id="waitUI" class="hidden card">
        <h2 id="displayRid">房号: ----</h2>
        <div class="loader"></div>
        <p id="waitMsg">正在等待对手加入... (1/2)</p>
        <button onclick="location.reload()" style="background: #555;">取消并退出</button>
    </div>

    <div id="gameUI" class="hidden">
        <div class="status-bar">
            <div><span id="modeTag" style="color:var(--blue)">模式</span> <b id="userTag"></b></div>
            <div>房号: <b id="roomTag">----</b></div>
            <div>机会: <b id="chanceTag" style="color:var(--red)">10</b></div>
        </div>

        <div class="search-wrap">
            <input type="text" id="searchBox" placeholder="搜索并选择一名选手..." oninput="handleSearch(this.value)">
            <div id="suggBox"></div>
        </div>

        <div class="grid" style="border-bottom: 1px solid #333; padding-bottom: 5px;">
            <div class="header-text">选手</div>
            <div class="header-text">队伍</div>
            <div class="header-text">地区</div>
            <div class="header-text">年龄</div>
            <div class="header-text">身份</div>
        </div>
        <div id="history"></div>
    </div>

    <script>
        // 配置项
        const API_URL = 'https://mininet-vm.taildb667f.ts.net'; // 替换为你的虚拟机地址
        const JSON_URL = 'https://raw.githubusercontent.com/MayIyask/fu18/main/players.json';

        let playersPool = [];
        let answer = null;
        let chances = 10;
        let isGameOver = false;
        let currentRid = null;
        let myName = "";
        let syncInterval = null;

        // 初始化加载数据
        (async function init() {
            try {
                const res = await fetch(JSON_URL);
                playersPool = await res.json();
                console.log("题库载入成功");
            } catch (e) {
                alert("无法加载 GitHub 题库，请检查网络或路径。");
            }
        })();

        // 模式切换逻辑
        async function startMode(mode) {
            myName = document.getElementById('username').value.trim() || "匿名玩家";
            
            if (mode === 'local') {
                answer = playersPool[Math.floor(Math.random() * playersPool.length)];
                enterGameUI("🕹️ 单机模式", "LOCAL");
            } else if (mode === 'create') {
                const res = await fetch(`${API_URL}/create_room`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({players: playersPool, username: myName})
                });
                const data = await res.json();
                currentRid = data.room;
                enterWaitUI(currentRid);
                startSyncLoop();
            } else if (mode === 'join') {
                currentRid = document.getElementById('ridInput').value.trim();
                if (!currentRid) return alert("请输入房号");
                const res = await fetch(`${API_URL}/join_room`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({room: currentRid, username: myName})
                });
                if (!res.ok) return alert("房间不存在或已满");
                startSyncLoop();
            }
        }

        // 心跳同步逻辑
        function startSyncLoop() {
            syncInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_URL}/sync`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({room: currentRid, username: myName})
                    });
                    const data = await res.json();

                    if (data.status === 'closed') {
                        clearInterval(syncInterval);
                        if (!isGameOver) {
                            alert("房间已关闭（对手离开或对局结束）");
                            location.reload();
                        }
                    } else if (data.status === 'playing' && !answer) {
                        answer = data.answer;
                        enterGameUI("🏠 对战模式", currentRid);
                    }
                } catch (e) { console.error("同步失败"); }
            }, 3000); // 3秒同步一次
        }

        // UI 切换
        function enterWaitUI(rid) {
            document.getElementById('menuUI').classList.add('hidden');
            document.getElementById('waitUI').classList.remove('hidden');
            document.getElementById('displayRid').innerText = "房号: " + rid;
        }

        function enterGameUI(title, rid) {
            document.getElementById('menuUI').classList.add('hidden');
            document.getElementById('waitUI').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            document.getElementById('modeTag').innerText = title;
            document.getElementById('roomTag').innerText = rid;
            document.getElementById('userTag').innerText = myName;
        }

        // 搜索逻辑
        function handleSearch(val) {
            const box = document.getElementById('suggBox');
            box.innerHTML = '';
            if (!val || isGameOver || !answer) return;

            const matches = playersPool.filter(p => p.name.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
            matches.forEach(p => {
                const div = document.createElement('div');
                div.className = 's-item';
                div.innerText = `${p.name} (${p.team})`;
                div.onclick = () => submitGuess(p);
                box.appendChild(div);
            });
        }

        // 核心猜测逻辑
        async function submitGuess(p) {
            document.getElementById('suggBox').innerHTML = '';
            document.getElementById('searchBox').value = '';

            // 1. 比对逻辑
            const diff = {
                name: p.name === answer.name ? 'green' : 'red',
                team: p.team === answer.team ? 'green' : 'red',
                cont: p.country === answer.country ? 'green' : (p.cont === answer.cont ? 'yellow' : 'red'),
                age: p.age === answer.age ? 'green' : (Math.abs(p.age - answer.age) <= 3 ? 'yellow' : 'red'),
                role: p.role === answer.role ? 'green' : 'red'
            };

            // 2. 年龄箭头
            let ageArrow = "";
            if (p.age < answer.age) ageArrow = "<span class='arrow'>↑</span>";
            else if (p.age > answer.age) ageArrow = "<span class='arrow'>↓</span>";

            // 3. 渲染
            const history = document.getElementById('history');
            const row = document.createElement('div');
            row.className = 'grid';
            
            const fields = [
                {c: diff.name, v: p.name},
                {c: diff.team, v: p.team},
                {c: diff.cont, v: p.country},
                {c: diff.age,  v: `<span>${p.age}</span>${ageArrow}`},
                {c: diff.role, v: p.role}
            ];

            fields.forEach(f => {
                const div = document.createElement('div');
                div.className = `cell ${f.c}`;
                div.innerHTML = f.v;
                row.appendChild(div);
            });
            history.prepend(row);

            // 4. 判定
            chances--;
            document.getElementById('chanceTag').innerText = chances;

            if (p.name === answer.name) {
                isGameOver = true;
                if (currentRid) {
                    await fetch(`${API_URL}/win`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({room: currentRid})
                    });
                }
                alert("🏆 猜对了！正确答案就是: " + answer.name);
                location.reload();
            } else if (chances <= 0) {
                isGameOver = true;
                alert("😭 机会用完了！正确答案是: " + answer.name);
                location.reload();
            }
        }
    </script>
</body>
</html>
