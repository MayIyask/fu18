<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CS2 ProGuesser 对战版</title>
    <style>
        :root { --green: #4caf50; --yellow: #ffeb3b; --red: #f44336; --dark: #121212; --blue: #3498db; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .hidden { display: none; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; text-align: center; border: 1px solid #333; width: 350px; }
        input { padding: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; margin: 5px; }
        button { padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer; background: var(--blue); color: white; font-weight: bold; margin: 5px; }
        .grid { display: grid; grid-template-columns: repeat(5, 100px); gap: 8px; margin-top: 10px; }
        .cell { height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 0.85em; font-weight: bold; text-align: center; }
        .search-wrap { position: relative; width: 320px; margin: 20px 0; }
        #suggBox { position: absolute; width: 100%; background: #222; border: 1px solid #444; z-index: 10; max-height: 150px; overflow-y: auto; }
        .s-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; text-align: left; }
        /* 等待动画 */
        .loader { border: 4px solid #333; border-top: 4px solid var(--blue); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="menu" class="card">
        <h1>🎮 CS2 ProGuesser</h1>
        <input type="text" id="username" placeholder="输入昵称" value="玩家" style="width: 80%;">
        <button onclick="startLocal()" style="background: #2ecc71; width: 80%;">🕹️ 单机模式</button>
        <div style="margin: 15px 0; color: #444;">———— 1V1 对战 ————</div>
        <input type="text" id="ridIn" placeholder="房号" style="width: 80px;">
        <button onclick="joinRoom()">加入</button>
        <button onclick="createRoom()">开房</button>
    </div>

    <div id="waitingRoom" class="hidden card">
        <h2 id="waitRid">房号: ----</h2>
        <div class="loader"></div>
        <p>等待对手加入中... (1/2)</p>
    </div>

    <div id="game" class="hidden">
        <div style="text-align: center; margin-bottom: 10px;">
            <span id="roomInfo" style="background: var(--blue); padding: 4px 10px; border-radius: 20px; font-size: 0.8em;"></span>
            <p>剩余机会: <span id="chances">10</span></p>
        </div>
        <div class="search-wrap">
            <input type="text" id="box" placeholder="搜索选手..." oninput="doSearch(this.value)" style="width:100%">
            <div id="suggBox"></div>
        </div>
        <div id="history"></div>
    </div>

    <script>
        const API = 'https://mininet-vm.taildb667f.ts.net';
        const JSON_URL = 'https://raw.githubusercontent.com/MayIyask/fu18/main/players.json';

        let pool = [], answer = null, left = 10, over = false, myRid = null, myName = "玩家", syncTimer = null;

        (async () => {
            const r = await fetch(JSON_URL);
            pool = await r.json();
        })();

        function startLocal() {
            answer = pool[Math.floor(Math.random()*pool.length)];
            myName = document.getElementById('username').value;
            showUI('game', '🕹️ 单机模式');
        }

        async function createRoom() {
            myName = document.getElementById('username').value;
            const r = await fetch(`${API}/create_room`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({players: pool, username: myName})
            });
            const d = await r.json();
            myRid = d.room;
            showUI('wait', d.room);
            startSync();
        }

        async function joinRoom() {
            myRid = document.getElementById('ridIn').value;
            myName = document.getElementById('username').value;
            const r = await fetch(`${API}/join_room`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({room: myRid, username: myName})
            });
            if(!r.ok) return alert("加入失败");
            startSync();
        }

        function startSync() {
            syncTimer = setInterval(async () => {
                try {
                    const r = await fetch(`${API}/sync`, {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({room: myRid, username: myName})
                    });
                    const d = await r.json();
                    if(d.status === 'closed' && !over) {
                        alert("房间已关闭（对手退出或对局结束）");
                        location.reload();
                    }
                    if(d.status === 'playing' && !answer) {
                        answer = d.answer;
                        showUI('game', `🏠 房号: ${myRid}`);
                    }
                } catch(e) {}
            }, 3000);
        }

        function showUI(type, info) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('game').classList.add('hidden');
            if(type === 'wait') {
                document.getElementById('waitingRoom').classList.remove('hidden');
                document.getElementById('waitRid').innerText = "房号: " + info;
            } else {
                document.getElementById('game').classList.remove('hidden');
                document.getElementById('roomInfo').innerText = info;
            }
        }

        function doSearch(v) {
            const b = document.getElementById('suggBox'); b.innerHTML = '';
            if(!v || over || !answer) return;
            pool.filter(p => p.name.toLowerCase().includes(v.toLowerCase())).slice(0,5).forEach(p => {
                const d = document.createElement('div');
                d.className = 's-item'; d.innerText = p.name;
                d.onclick = () => submitGuess(p);
                b.appendChild(d);
            });
        }

        async function submitGuess(p) {
            document.getElementById('suggBox').innerHTML = '';
            document.getElementById('box').value = '';
            
            // ... 之前的比对逻辑 (此处简写)
            const row = document.createElement('div'); row.className = 'grid';
            const res = {
                name: p.name === answer.name ? 'green' : 'red',
                age: p.age === answer.age ? 'green' : (Math.abs(p.age - answer.age) <= 3 ? 'yellow' : 'red')
            };
            // 渲染单元格... (代码同前，省略以保持简洁)
            
            if(p.name === answer.name) {
                over = true;
                await fetch(`${API}/win`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({room: myRid})
                });
                alert("🏆 你赢了！对局结束。");
                location.reload();
            }
            left--; document.getElementById('chances').innerText = left;
        }

        // 自动退出处理
        window.addEventListener('beforeunload', () => {
            // 这里可以发一个异步请求尝试通知退出，但靠后端的超时清理更稳健
        });
    </script>
</body>
</html>
