<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>CS2 ProGuesser 1V1 对战</title>
    <style>
        :root { --green: #4caf50; --yellow: #ffeb3b; --red: #f44336; --dark: #121212; --blue: #3498db; --panel: #1e1e1e; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .hidden { display: none; }
        .card { background: var(--panel); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 340px; margin-top: 50px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; margin: 8px 0; width: 100%; box-sizing: border-box; }
        button { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; background: var(--blue); color: white; font-weight: bold; }
        
        #gameUI { width: 100%; max-width: 1000px; display: flex; flex-direction: column; align-items: center; }
        .battle-container { display: flex; width: 100%; gap: 15px; justify-content: center; margin-top: 10px; }
        .side { flex: 1; min-width: 280px; max-width: 480px; }
        .side-title { text-align: center; padding: 10px; background: #222; border-radius: 8px; margin-bottom: 10px; font-size: 0.85em; border: 1px solid #444; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 5px; }
        .cell { height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 4px; font-size: 0.75em; font-weight: bold; text-align: center; position: relative; }
        .arrow { font-size: 1.1em; line-height: 0.8; margin-top: 2px; }
        .green { background: var(--green); } .yellow { background: var(--yellow); color: black; } .red { background: var(--red); }
        
        .search-wrap { width: 100%; max-width: 400px; position: relative; margin: 15px 0; }
        #suggBox { position: absolute; width: 100%; background: #2c3e50; z-index: 100; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; }
        .s-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #3e4f5f; font-size: 0.9em; }
        .s-item:hover { background: #34495e; }
    </style>
</head>
<body>

    <div id="menuUI" class="card">
        <h1>🎮 ProGuesser</h1>
        <input type="text" id="username" placeholder="输入你的名字" value="玩家1">
        <button onclick="startMode('local')" style="background: var(--green); width: 100%;">🕹️ 单机模式</button>
        <div style="margin:15px; color:#555">———— 1V1 ————</div>
        <div style="display:flex; gap:5px"><input id="ridInput" placeholder="房号" style="flex:1"><button onclick="startMode('join')">加入</button></div>
        <button onclick="startMode('create')" style="width:100%; margin-top:5px">🔥 创建房间</button>
    </div>

    <div id="waitUI" class="hidden card">
        <h2 id="waitRid">房号: ----</h2>
        <div style="margin:20px">⌛ 等待对手加入...</div>
        <button onclick="location.reload()" style="background:#555">退出</button>
    </div>

    <div id="gameUI" class="hidden">
        <div id="gameHeader" style="font-size:0.9em; margin-bottom:10px; color:var(--blue)"></div>
        
        <div class="search-wrap">
            <input type="text" id="searchBox" placeholder="输入选手名字..." oninput="handleSearch(this.value)">
            <div id="suggBox"></div>
        </div>

        <div class="battle-container">
            <div class="side">
                <div class="side-title"><b>我 (<span id="myNameLabel"></span>)</b> | 剩余: <span id="chanceTag">10</span></div>
                <div id="myHistory"></div>
            </div>
            <div class="side">
                <div class="side-title"><b>对手 (<span id="oppNameLabel">等待...</span>)</b></div>
                <div id="oppHistory"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://mininet-vm.taildb667f.ts.net';
        const JSON_URL = 'https://raw.githubusercontent.com/MayIyask/fu18/main/players.json';
        let pool = [], answer = null, chances = 10, rid = null, myName = "", over = false;

        (async () => { pool = await (await fetch(JSON_URL)).json(); })();

        async function startMode(mode) {
            myName = document.getElementById('username').value.trim() || "玩家";
            document.getElementById('myNameLabel').innerText = myName;

            if(mode === 'local') {
                answer = pool[Math.floor(Math.random()*pool.length)];
                showUI('game', "🕹️ 单机练习");
            } else {
                const isCreate = mode === 'create';
                const body = isCreate ? {players: pool, username: myName} : {room: document.getElementById('ridInput').value, username: myName};
                try {
                    const r = await fetch(`${API}/${isCreate?'create_room':'join_room'}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(body)
                    });
                    const d = await r.json();
                    if(!r.ok) return alert(d.msg);
                    rid = isCreate ? d.room : body.room;
                    showUI('wait', rid);
                    setInterval(sync, 3000);
                } catch(e) { alert("服务器连接失败"); }
            }
        }

        async function sync() {
            if(over) return;
            try {
                const r = await fetch(`${API}/sync`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({room: rid, username: myName})
                });
                const d = await r.json();
                
                if(d.status === 'closed') {
                    over = true;
                    if(d.reason === 'win') alert("🏁 对局结束！有人猜中了答案！\n正确答案是: " + d.answer.name);
                    else if(d.reason === 'exhausted') alert("🏁 对局结束！双方次数均已耗尽。\n正确答案是: " + d.answer.name);
                    else alert("⚠️ 房间异常关闭");
                    location.reload();
                    return;
                }

                if(d.status === 'playing') {
                    answer = d.answer;
                    showUI('game', "🏠 房号: " + rid);
                    // 更新对手名字
                    const opp = d.player_names.find(n => n !== myName);
                    if(opp) document.getElementById('oppNameLabel').innerText = opp;
                    renderHistory(d.history);
                }
            } catch(e) {}
        }

        function renderHistory(history) {
            const myBox = document.getElementById('myHistory');
            const oppBox = document.getElementById('oppHistory');
            myBox.innerHTML = ''; oppBox.innerHTML = '';

            history.forEach(item => {
                const isMe = item.user === myName;
                const row = document.createElement('div');
                row.className = 'grid';
                
                const fields = ['name', 'team', 'cont', 'age', 'role'];
                fields.forEach(f => {
                    const c = document.createElement('div');
                    c.className = `cell ${item.data.colors[f]}`;
                    let val = (isMe || rid === null) ? item.data.values[f] : "****";
                    // 如果是年龄且猜错了，加上箭头（仅限自己可见或单机）
                    if(f === 'age' && (isMe || rid === null) && item.data.colors[f] !== 'green') {
                        val += `<span class="arrow">${item.data.ageArrow}</span>`;
                    }
                    c.innerHTML = `<span>${val}</span>`;
                    row.appendChild(c);
                });

                if(isMe) myBox.prepend(row); else oppBox.prepend(row);
            });
        }

        async function submitGuess(p) {
            if(chances <= 0 || over) return;

            // 年龄箭头判断
            let arrow = "";
            if(p.age < answer.age) arrow = "↑";
            else if(p.age > answer.age) arrow = "↓";

            const diff = {
                colors: {
                    name: p.name === answer.name ? 'green' : 'red',
                    team: p.team === answer.team ? 'green' : 'red',
                    cont: p.country === answer.country ? 'green' : (p.cont === answer.cont ? 'yellow' : 'red'),
                    age: p.age === answer.age ? 'green' : (Math.abs(p.age - answer.age) <= 3 ? 'yellow' : 'red'),
                    role: p.role === answer.role ? 'green' : 'red'
                },
                values: { name: p.name, team: p.team, cont: p.country, age: p.age, role: p.role },
                ageArrow: arrow,
                isCorrect: p.name === answer.name
            };

            if(rid) {
                await fetch(`${API}/submit_guess`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({room: rid, username: myName, guess: diff})
                });
            } else {
                localHistory.push({user: myName, data: diff});
                renderHistory(localHistory);
                if(diff.isCorrect) { alert("🎯 命中答案！"); location.reload(); }
            }

            chances--;
            document.getElementById('chanceTag').innerText = chances;
            if(chances <= 0 && !diff.isCorrect && !rid) {
                alert("💀 次数耗尽！答案是: " + answer.name);
                location.reload();
            }
        }

        let localHistory = [];
        function showUI(type, val) {
            document.getElementById('menuUI').classList.add('hidden');
            document.getElementById('waitUI').classList.add('hidden');
            document.getElementById('gameUI').classList.add('hidden');
            if(type === 'wait') {
                document.getElementById('waitUI').classList.remove('hidden');
                document.getElementById('waitRid').innerText = "房号: " + val;
            } else {
                document.getElementById('gameUI').classList.remove('hidden');
                document.getElementById('gameHeader').innerText = val;
            }
        }

        function handleSearch(v) {
            const b = document.getElementById('suggBox'); b.innerHTML = '';
            if(!v || over || chances <= 0 || !answer) return;
            pool.filter(p => p.name.toLowerCase().includes(v.toLowerCase())).slice(0,5).forEach(p => {
                const d = document.createElement('div');
                d.className = 's-item'; d.innerText = p.name + " (" + p.team + ")";
                d.onclick = () => { b.innerHTML = ''; document.getElementById('searchBox').value=''; submitGuess(p); };
                b.appendChild(d);
            });
        }
    </script>
</body>
</html>
